<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Checkout Grid</title>

    <style>
        body {
            margin: 0;
            font-family: Inter, Arial, sans-serif;
            background: #f8fafc;
            color: #0f172a;
        }

        .checkout {
            max-width: 1100px;
            margin: auto;
            padding: 34px 20px;
            display: grid;
            grid-template-columns: 1.4fr .8fr;
            gap: 22px;
        }

        .box {
            background: white;
            border: 1px solid #e2e8f0;
            border-radius: 24px;
            padding: 24px;
            box-shadow: 0 14px 30px rgba(15, 23, 42, .06);
        }

        .form-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 14px;
        }

        .full {
            grid-column: 1 / -1;
        }

        label {
            font-weight: 700;
        }

        input,
        textarea {
            width: 100%;
            margin-top: 6px;
            padding: 13px;
            border: 1px solid #cbd5e1;
            border-radius: 12px;
            box-sizing: border-box;
        }

        .summary {
            align-self: start;
            position: sticky;
            top: 20px;
        }

        .row {
            display: flex;
            justify-content: space-between;
            border-bottom: 1px solid #e5e7eb;
            padding: 12px 0;
        }

        .pay {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 14px;
            background: #2563eb;
            color: white;
            font-weight: 900;
            cursor: pointer;
        }

        @media (max-width:820px) {
            .checkout {
                grid-template-columns: 1fr;
            }

            .form-grid {
                grid-template-columns: 1fr;
            }

            .summary {
                position: static;
            }
        }
    </style>
</head>

<body>
    <main class="checkout">

        <section class="box">
            <h1>Checkout</h1>

            <div class="form-grid">
                <label>
                    Nama
                    <input type="text" placeholder="Nama lengkap">
                </label>

                <label>
                    Email
                    <input type="email" placeholder="email@domain.com">
                </label>

                <label class="full">
                    Alamat
                    <textarea rows="4"></textarea>
                </label>

                <label>
                    Kota
                    <input type="text">
                </label>

                <label>
                    Kode Pos
                    <input type="text">
                </label>
            </div>
        </section>

        <aside class="box summary">
            <h2>Ringkasan</h2>

            <div class="row">
                <span>Produk</span>
                <b>Rp750.000</b>
            </div>

            <div class="row">
                <span>Ongkir</span>
                <b>Rp25.000</b>
            </div>

            <div class="row">
                <span>Total</span>
                <b>Rp775.000</b>
            </div>

            <button class="pay">Bayar Sekarang</button>
        </aside>

    </main>
</body>

</html>
