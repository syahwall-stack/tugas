<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>grid 1</title>
    <style>
        .container {
            display: grid;
            grid-auto-rows: 80px;
            margin-bottom: 20px;
            margin-top: 20px;
        }

        .item {
            background-color: lightblue;
            border: 1px solid black;
            padding: 10px;
            text-align: center;
        }
    </style>
</head>

<body>
    <div class="container"
        style="grid-template-columns: auto auto auto auto; grid-template-rows: 100px 200px; row-gap: 20px; column-gap: 10px;column-gap: 10px 10px ; row-gap: 20px;">
        <div class="item">1</div>
        <div class="item">2</div>
        <div class="item">3</div>
        <div class="item">4</div>
        <div class="item">5</div>
        <div class="item">6</div>
        <div class="item">7</div>
        <div class="item">8</div>
        <div class="item">6</div>
        <div class="item">7</div>
        <div class="item">8</div>

    </div>

    <div class="container" style="grid-template-columns: 1fr 2fr 1fr auto">
        <div class="item">1</div>
        <div class="item">2</div>
        <div class="item">3</div>
        <div class="item">4</div>
        <div class="item">5</div>
        <div class="item">6</div>
        <div class="item">7</div>
        <div class="item">8</div>
    </div>
</body>

</html>
