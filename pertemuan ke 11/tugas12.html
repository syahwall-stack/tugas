<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1.0">
    <title>Subgrid
        Cards</title>
    <style>
        body {
            margin: 0;
            font-family: Inter, Arial, sans-serif;
            background: #f8fafc;
            color: #111827
        }

        .wrap {
            max-width: 1100px;
            margin: auto;
            padding: 40px 20px
        }

        .cards {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 18px;
            align-items: stretch
        }

        .card {
            background: white;
            border: 1px solid #e5e7eb;
            border-radius: 24px;
            padding: 22px;
            display: grid;
            grid-template-rows: auto 1fr auto;
            gap: 16px;
            box-shadow: 0 16px 40px rgba(17, 24, 39, .08)
        }

        @supports(grid-template-rows:subgrid) {
            .cards {
                grid-template-rows: auto 1fr auto
            }

            .card {
                grid-row: span 3;
                grid-template-rows: subgrid
            }
        }

        button {
            border: 0;
            border-radius: 14px;
            background: #1d4ed8;
            color: white;
            padding: 13px;
            font-weight: 900;
            width: 100%
        }

        .features {
            color: #475569;
            line-height: 1.8
        }
    </style>
</head>

<body>
    <main class="wrap">
        <h1>Subgrid Pricing Alignment</h1>
        <section class="cards">
            <article class="card">
                <h2>Starter</h2>
                <div class="features">1 user<br>3 proyek</div><button>Pilih</button>
            </article>
            <article class="card">
                <h2>Business</h2>
                <div class="features">10
                    user<br>Unlimited proyek<br>Priority support<br>Analytics</div><button>Pilih</button>
            </article>
            <article class="card">
                <h2>Enterprise</h2>
                <div class="features">Custom user<br>SLA<br>SSO<br>Integrasi API</div><button>Pilih</button>
            </article>
        </section>
    </main>
</body>

</html>
