<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Product Catalog Grid</title>
    <style>
        * {
            box-sizing: border-box
        }

        body {
            margin: 0;
            font-family: Inter, Arial, sans-serif;
            background: #f8fafc;
            color: #0f172a
        }

        .catalog {
            max-width: 1120px;
            margin: auto;
            padding: 40px 20px
        }

        .catalog h1 {
            margin: 0 0 8px;
            font-size: clamp(1.8rem, 4vw, 3rem)
        }

        .catalog p {
            color: #64748b;
            margin: 0 0 24px
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 20px
        }

        .card {
            background: #fff;
            border: 1px solid #e2e8f0;
            border-radius: 22px;
            padding: 18px;
            box-shadow: 0 18px 40px rgba(15, 23, 42, .08)
        }

        img {
            height: 150px;
            border-radius: 16px;
            background: linear-gradient(135deg, #dbeafe, #67e8f9);
            display: block;
            margin: 0 auto;
            max-width: 100%;
            object-fit: cover;
            font-size: 42px
        }

        .badge {
            display: inline-block;
            margin: 14px 0 8px;
            padding: 6px 10px;
            border-radius: 999px;
            background: #dcfce7;
            color: #166534;
            font-size: .8rem;
            font-weight: 700
        }

        .card h3 {
            margin: 0 0 6px
        }

        .price {
            font-size: 1.25rem;
            font-weight: 800;
            color: #1d4ed8
        }

        .card button {
            width: 100%;
            margin-top: 14px;
            padding: 12px;
            border: 0;
            border-radius: 12px;
            background: #2563eb;
            color: #fff;
            font-weight: 800;
            cursor: pointer
        }
    </style>
</head>

<body>
    <section class="catalog">
        <h1>Katalog Produk Industri</h1>
        <p>Grid responsif tanpa rumit.</p>
        <div class="grid">
            <article class="card"><img src="img/smartwacth.avif" alt="Smart Watch"><span class="badge">Ready</span>
                <h3>Smart Watch</h3>
                <div class="price">Rp ⌚ 899.000</div><button>Tambah</button>
            </article>
            <article class="card"><img src="img/headsetpro.jpeg" alt="Headset Pro"><span class="badge">Ready</span>
                <h3>Headset Pro</h3>
                <div class="price">Rp 🎧 459.000</div><button>Tambah</button>
            </article>
            <article class="card"><img src="img/keyboard.jpeg" alt="Keyboard Office"><span class="badge">Ready</span>
                <h3>Keyboard Office</h3>
                <div class="price">Rp ⌨️ 350.000</div><button>Tambah</button>
            </article>
            <article class="card"><img src="img/mouse wireless.jpeg" alt=""><span class="badge">Limited</span>
                <h3>Mouse Wireless</h3>
                <div class="price">Rp 🖱️ 210.000</div><button>Tambah</button>
            </article>
            <article class="card"><img src="img/laptop stnad.jpeg" alt=""><span class="badge">Ready</span>
                <h3>Laptop Stand</h3>
                <div class="price">Rp 💻 180.000</div><button>Tambah</button>
            </article>
            <article class="card"><img src="img/usb hub.jpeg" alt=""><span class="badge">Ready</span>
                <h3>USB Hub</h3>
                <div class="price">Rp 🔌 125.000</div><button>Tambah</button>
            </article>
        </div>
    </section>
</body>

</html>
