<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1.0">
    <title>Dashboard
        Akademik TRPL</title>
    <style>
        * {
            box-sizing: border-box
        }

        body {
            margin: 0;
            font-family: Inter, Arial, sans-serif;
            background: #f1f5f9;
            color: #0f172a
        }

        .app {
            min-height: 100vh;
            display: grid;
            grid-template-columns: 250px 1fr;
            grid-template-rows: 70px 1fr;
            grid-template-areas: "top top" "nav main"
        }

        .top {
            grid-area: top;
            background: #1e40af;
            color: white;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 24px
        }

        .nav {
            grid-area: nav;
            background: #0f172a;
            color: white;
            padding: 20px
        }

        .nav a {
            display: block;
            color: #cbd5e1;
            text-decoration: none;
            padding: 12px;
            border-radius: 12px
        }

        .main {
            grid-area: main;
            padding: 24px
        }

        .grid {
            display: grid;
            grid-template-columns: 1.2fr .8fr;
            gap: 18px
        }

        .cards {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 14px;
            margin-bottom: 18px
        }

        .card,
        .panel {
            background: white;
            border-radius: 22px;
            padding: 20px;
            border: 1px solid #e2e8f0;
            box-shadow: 0 12px 28px rgba(15, 23, 42, .06)
        }

        .score {
            font-size: 2rem;
            color: #1d4ed8;
            font-weight: 900
        }

        .schedule {
            display: grid;
            gap: 10px
        }

        .schedule div {
            background: #eff6ff;
            border-radius: 14px;
            padding: 12px
        }

        @media(max-width:880px) {
            .app {
                grid-template-columns: 1fr;
                grid-template-rows: auto auto 1fr;
                grid-template-areas: "top" "nav" "main"
            }

            .nav {
                display: flex;
                overflow: auto;
                gap: 8px
            }

            .nav a {
                white-space: nowrap
            }

            .grid {
                grid-template-columns: 1fr
            }
        }
    </style>
</head>

<body>
    <div class="app">
        <header class="top"><b>Dashboard Akademik TRPL</b><span>Musawarman, M.M.S.I</span></header>
        <nav class="nav"><a>Beranda</a><a>Jadwal</a><a>Nilai</a><a>Tugas</a></nav>
        <main class="main">
            <h1>Selamat Datang, Mahasiswa</h1>
            <section class="cards">
                <div class="card">SKS Aktif<br><span class="score">21</span></div>
                <div class="card">IPK<br><span class="score">3.74</span></div>
                <div class="card">Tugas<br><span class="score">5</span></div>
            </section>
            <section class="grid">
                <div class="panel">
                    <h2>Jadwal Hari Ini</h2>
                    <div class="schedule">
                        <div>08:00 - Pemrograman Web 1</div>
                        <div>10:00 - Basis Data</div>
                        <div>13:00 - UI/UX</div>
                    </div>
                </div>
                <aside class="panel">
                    <h2>Pengumuman</h2>
                    <p>Praktikum CSS Grid dikumpulkan Jumat pukul 23.59.</p>
                </aside>
            </section>
        </main>
    </div>
</body>

</html>
