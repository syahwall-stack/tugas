<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1.0">
    <title>LMS
        Grid</title>
    <style>
        body {
            margin: 0;
            font-family: Inter, Arial, sans-serif;
            background: #eef2ff;
            color: #111827
        }

        .lms {
            max-width: 1100px;
            margin: auto;
            padding: 34px 20px
        }

        .hero {
            background: #3730a3;
            color: white;
            border-radius: 28px;
            padding: 30px;
            margin-bottom: 20px
        }

        .courses {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
            gap: 18px
        }

        .course {
            background: white;
            border-radius: 22px;
            padding: 20px;
            box-shadow: 0 15px 40px rgba(49, 46, 129, .12)
        }

        .meta {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin: 16px 0
        }

        .meta div {
            background: #f1f5f9;
            border-radius: 14px;
            padding: 12px
        }

        .progress {
            height: 10px;
            background: #e5e7eb;
            border-radius: 999px;
            overflow: hidden
        }

        .progress span {
            display: block;
            height: 100%;
            background: #4f46e5;
            border-radius: 999px
        }
    </style>
</head>

<body>
    <main class="lms">
        <section class="hero">
            <h1>Dashboard Akademik</h1>
            <p>Selamat datang, mahasiswa
                TRPL.</p>
        </section>
        <section class="courses">
            <article class="course">
                <h2>Pemrograman Web 1</h2>
                <div class="meta">
                    <div>Modul<br><b>10/16</b></div>
                    <div>Deadline<br><b>Jumat</b></div>
                </div>
                <div class="progress"><span style="width:62%"></span></div>
            </article>
            <article class="course">
                <h2>Basis Data</h2>
                <div class="meta">
                    <div>Modul<br><b>8/14</b></div>
                    <div>Deadline<br><b>Senin</b></div>
                </div>
                <div class="progress"><span style="width:55%"></span></div>
            </article>
            <article class="course">
                <h2>UI/UX</h2>
                <div class="meta">
                    <div>Modul<br><b>11/14</b></div>
                    <div>Deadline<br><b>Rabu</b></div>
                </div>
                <div class="progress"><span style="width:78%"></span></div>
            </article>
        </section>
    </main>
</body>

</html>
