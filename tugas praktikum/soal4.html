<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>kotak</title>
    <style>
        .box {
            width: 120px;
            height: 120px;
            margin: 10px;
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .box1 {
            background-color: tomato;
        }

        .box2 {
            background-color: seagreen;
            position: relative;
            top: 30px;
            left: 30px;
        }

        .box3 {
            background-color: steelblue;
        }

        .layout {
            height: 100%;
            width: 1200px;
        }
    </style>
</head>

<body>
    <div class="layout">
        <div class="box box1">box1</div>
        <div class="box box2">box2</div>
        <div class="box box3">box3</div>
    </div>

</body>

</html>
