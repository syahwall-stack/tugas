<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>tooltip muncul di atas tombol</title>
    <style>
        .tooltip-box {
            display: inline-block;
            margin: 100px;
        }

        .tooltip-text {
            background: black;
            color: white;
            padding: 8px 10px;
            border-radius: 6px;
        }
    </style>
</head>

<body>
    <div class="tooltip-box">
        <button>Bantuan</button> <span class="tooltip-text">Klik untuk melihat petunjuk</span>
    </div>
</body>

</html>
