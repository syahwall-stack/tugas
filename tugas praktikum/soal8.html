<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>menentukan ururtan tumpukan kotak</title>

    <style>
        .wrapper {
            width: 400px;
            height: 250px;
            margin: 30px auto;
        }

        .kotak {
            width: 120px;
            height: 120px;
            color: white;
            position: absolute;
        }

        .merah {
            background: red;
            top: 40px;
            left: 40px;
        }

        .hijau {
            background: green;
            top: 70px;
            left: 90px;
        }

        .biru {
            background: blue;
            top: 100px;
            left: 140px;
        }
    </style>
</head>

<body>
    <div class="wrapper">
        <div class="kotak merah">Merah</div>
        <div class="kotak hijau">Hijau</div>
        <div class="kotak biru">Biru</div>
    </div>
</body>

</html>
