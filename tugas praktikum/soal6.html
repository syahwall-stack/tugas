<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>notifikasi mengambang</title>

    <style>
        .dashboar {
            position: relative;
            width: 600px;
            padding: 20px;
            border: 1px solid #999;
            margin: 40px auto;
        }

        .notif {
            position: absolute;
            width: 200px;
            right: 10px;
            top: 10px;
            background-color: orange;
            padding: 10px;
        }
    </style>
</head>

<body>
    <div class="dashboar">
        <div class="notif">server hampir penuh</div>
        <h2>dashboard admin</h2>
        <p>status sistem hari normal</p>
    </div>
</body>

</html>
